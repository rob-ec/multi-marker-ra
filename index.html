<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>PobrActionFigure - MVP</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
        /* Estilos da Interface do Jogo */
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        /* Camada de UI que cobre a câmera até o jogo começar */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #2c3e50; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .screen { display: flex; flex-direction: column; align-items: center; }
        #char-screen { display: none; } /* Escondido inicialmente */

        h1 { color: white; font-size: 2.5rem; text-shadow: 3px 3px 0px #000; margin-bottom: 30px; text-align: center;}
        h2 { color: #f1c40f; text-shadow: 2px 2px 0px #000; margin-bottom: 20px;}

        /* Botões Estilo Jogo */
        .btn {
            background: #e67e22; border: 4px solid #d35400; color: white;
            padding: 15px; margin: 10px; font-size: 1.2rem; font-weight: bold;
            width: 280px; text-align: center; cursor: pointer; text-decoration: none;
            border-radius: 8px; font-family: inherit; transition: 0.2s;
        }
        .btn:hover:not(:disabled) { background: #f39c12; transform: scale(1.05); }
        .btn:disabled { background: #7f8c8d; border-color: #95a5a6; cursor: not-allowed; opacity: 0.6; }

        /* HUD de Batalha AR (Aparece apenas quando o marcador é lido) */
        #ar-hud {
            position: fixed; bottom: 30px; left: 0; width: 100vw;
            display: none; justify-content: center; gap: 20px; z-index: 999;
        }
        .combat-btn {
            background: rgba(0,0,0,0.7); border: 3px solid; color: white;
            padding: 15px 30px; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; border-radius: 12px; font-family: inherit; text-transform: uppercase;
        }
        .btn-attack { border-color: #e74c3c; color: #e74c3c; }
        .btn-attack:active { background: #e74c3c; color: white; }
        
        .btn-defend { border-color: #3498db; color: #3498db; }
        .btn-defend:active { background: #3498db; color: white; }
    </style>

    <script>
        // Lógica da Interface e Componentes AR
        document.addEventListener('DOMContentLoaded', () => {
            const menuScreen = document.getElementById('menu-screen');
            const charScreen = document.getElementById('char-screen');
            const uiLayer = document.getElementById('ui-layer');
            const wizardModelDiv = document.getElementById('wizard-model');
            const defendShield = document.getElementById('defend-shield');

            // --- NAVEGAÇÃO DOS MENUS ---
            document.getElementById('btn-jogador').addEventListener('click', () => {
                menuScreen.style.display = 'none';
                charScreen.style.display = 'flex';
            });

            document.getElementById('btn-mago').addEventListener('click', () => {
                uiLayer.style.display = 'none'; // Esconde a UI e revela a câmera AR
            });

            // --- AÇÕES DE COMBATE ---
            // Ação de Defender (Toggle do escudo azul)
            document.getElementById('btn-defend').addEventListener('click', () => {
                const isVisible = defendShield.getAttribute('visible');
                defendShield.setAttribute('visible', !isVisible);
            });

            // Ação de Atacar (Animação de esfera vermelha expandindo)
            document.getElementById('btn-attack').addEventListener('click', () => {
                const attackEffect = document.createElement('a-sphere');
                attackEffect.setAttribute('color', '#e74c3c');
                attackEffect.setAttribute('radius', '0.5');
                attackEffect.setAttribute('opacity', '0.8');
                attackEffect.setAttribute('position', '0 1 0'); // Altura do efeito no modelo
                
                // Animações de expansão e sumiço
                attackEffect.setAttribute('animation__scale', 'property: scale; to: 5 5 5; dur: 400; easing: easeOutQuad');
                attackEffect.setAttribute('animation__fade', 'property: opacity; to: 0; dur: 400; easing: easeOutQuad');

                wizardModelDiv.appendChild(attackEffect);

                // Limpa o elemento após a animação
                setTimeout(() => {
                    if(wizardModelDiv.contains(attackEffect)) {
                        wizardModelDiv.removeChild(attackEffect);
                    }
                }, 400);
            });
        });

        // Componente A-Frame para detectar o marcador do Mago
        AFRAME.registerComponent('mago-tracker', {
            init: function () {
                const hud = document.getElementById('ar-hud');
                this.el.addEventListener('markerFound', () => { hud.style.display = 'flex'; });
                this.el.addEventListener('markerLost', () => { hud.style.display = 'none'; });
            }
        });
    </script>
</head>
<body>

    <div id="ui-layer">
        <div id="menu-screen" class="screen">
            <h1>PobrActionFigure</h1>
            <a href="assets/markers/page.pdf" download="PobrActionFigure-Marcadores.pdf" class="btn">Baixar Marcadores (PDF)</a>
            <button class="btn" disabled>Jogar como Mestre</button>
            <button id="btn-jogador" class="btn">Jogar como Jogador</button>
        </div>

        <div id="char-screen" class="screen">
            <h2>Escolha sua Classe</h2>
            <button id="btn-mago" class="btn">Mago</button>
            <button class="btn" disabled>Espadachim</button>
        </div>
    </div>

    <div id="ar-hud">
        <button id="btn-attack" class="combat-btn btn-attack">Atacar</button>
        <button id="btn-defend" class="combat-btn btn-defend">Defender</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="colorManagement: true;">
        
        <!-- Inimigo: Goblin -->
        <a-marker type="pattern" url="assets/markers/goblin-c.patt">
            <a-entity gltf-model="url(assets/3d/goblin.glb)" scale="0.03 0.03 0.03" position="0 0.5 -0.5"></a-entity>
        </a-marker>

        <!-- Inimigo: Aranha -->
        <a-marker type="pattern" url="assets/markers/spider.patt">
            <a-entity gltf-model="url(assets/3d/animated_spider.glb)" scale="0.5 0.5 0.5" position="0 0 0" animation-mixer></a-entity>
        </a-marker>

        <!-- Jogador -->
        <a-marker type="pattern" url="assets/markers/wand.patt" mago-tracker>
            <a-entity id="wizard-model" gltf-model="url(assets/3d/elf_wizard.glb)" scale="2 2 2" position="0 0 0" animation-mixer>
                
                <a-sphere id="defend-shield" radius="0.4" color="#3498db" opacity="0.4" visible="false" position="0 0.5 0" wireframe="true"></a-sphere>
            
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
