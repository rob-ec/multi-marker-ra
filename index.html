<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <meta name="description" content="AR Project - Corinthians Symbol" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene
      embedded
      arjs="sourceType: webcam;"
      cursor="rayOrigin: mouse"
      raycaster="objects: .clickable"
    >
      <a-marker type="pattern" url="assets/markers/goblin-a.patt">
        <a-box color="blue" position="0 0.5 0" scale="1 1 1"></a-box>
      </a-marker>

      <a-marker type="pattern" url="assets/markers/goblin-b.patt">
        <a-box color="green" position="0 0.5 0" scale="1 1 1"></a-box>
      </a-marker>

      <a-marker type="pattern" url="assets/markers/goblin-c.patt">
        <a-entity
          class="clickable"
          gltf-model="url(assets/3d/goblin.glb)"
          scale="0.03 0.03 0.03"
          position="1 0.5 -0.5"
        >
        </a-entity>
      </a-marker>

      <a-marker type="pattern" url="assets/markers/spider.patt">
        <a-entity
          class="clickable"
          gltf-model="url(assets/3d/animated_spider.glb)"
          scale="0.4 0.4 0.4"
          position="0 0 0"
          animation-mixer
        >
        </a-entity>
        <a-entity light="type: ambient; color: #FBB"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="assets/markers/sword.patt">
        <a-box color="yellow" position="0 0.5 0" scale="1 1 1"></a-box>
      </a-marker>

      <a-marker type="pattern" url="assets/markers/treasure-chest.patt">
        <a-box color="orange" position="0 0.5 0" scale="1 1 1"></a-box>
      </a-marker>

      <a-marker type="pattern" url="assets/markers/wand.patt">
        <a-entity
          class="clickable"
          gltf-model="url(assets/3d/elf_wizard.glb)"
          scale="1.5 1.5 1.5"
          position="0 0 0"
          anmation-mixer
        >
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
